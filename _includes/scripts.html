<script>
function toggleLang() {
  var html = document.documentElement;
  if (html.classList.contains('zh')) {
    html.classList.remove('zh');
    localStorage.setItem('lang', 'en');
  } else {
    html.classList.add('zh');
    localStorage.setItem('lang', 'zh');
  }
  // Trigger greedy-nav recalculation
  window.dispatchEvent(new Event('resize'));
}
</script>
